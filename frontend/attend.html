<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendX — Mark Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--sur:#0d1221;--sur2:#131929;--sur3:#1a2236;--bor:rgba(99,160,255,.12);--bor2:rgba(99,160,255,.22);--acc:#3d8bff;--acc2:#7c4dff;--acc3:#00e5ff;--ok:#00e676;--warn:#ffd740;--err:#ff5252;--tx:#e8eeff;--tx2:#8899bb;--tx3:#4a5a7a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(61,139,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(61,139,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:rgba(61,139,255,.08);top:-100px;right:-100px}
.o2{width:400px;height:400px;background:rgba(124,77,255,.07);bottom:-100px;left:-100px}
.card{background:var(--sur);border:1px solid var(--bor2);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:460px;box-shadow:0 0 60px rgba(61,139,255,.12),0 0 40px rgba(124,77,255,.08),0 40px 80px rgba(0,0,0,.4);position:relative;overflow:hidden;z-index:1}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2),var(--acc3))}
.logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--tx2);margin-bottom:1.5rem;letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between}
.logo span{color:var(--acc)}
.icon-wrap{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,rgba(61,139,255,.15),rgba(124,77,255,.15));border:2px solid var(--bor2);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem}
.heading{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.sub{color:var(--tx2);font-size:.85rem;text-align:center;margin-bottom:1.5rem}
.sesinfo{background:rgba(61,139,255,.08);border:1px solid rgba(61,139,255,.2);border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;display:none}
.sesinfo.show{display:block}
.si-name{font-weight:600;font-size:.9rem;margin-bottom:.2rem}
.si-meta{font-size:.78rem;color:var(--tx2)}
.gps-banner{border-radius:10px;padding:.65rem 1rem;margin-bottom:1rem;font-size:.8rem;display:none;align-items:center;gap:.6rem}
.gps-banner.show{display:flex}
.gps-active{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--ok)}
.gps-warn{background:rgba(255,215,64,.08);border:1px solid rgba(255,215,64,.2);color:var(--warn)}
.pipeline{display:flex;flex-direction:column;gap:.45rem;margin:1.2rem 0}
.layer{display:flex;align-items:center;gap:.75rem;padding:.6rem .85rem;border-radius:10px;background:var(--sur2);border:1px solid var(--bor);font-size:.82rem;transition:all .35s}
.ldot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:all .35s;font-weight:700}
.layer.pending .ldot{background:var(--sur3);border:1px solid var(--bor);color:var(--tx3)}
.layer.checking .ldot{background:rgba(255,215,64,.2);border:1px solid rgba(255,215,64,.4);color:var(--warn);animation:pulse 1s infinite}
.layer.passed .ldot{background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.3);color:var(--ok)}
.layer.failed .ldot{background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.3);color:var(--err)}
.layer.advisory .ldot{background:rgba(255,215,64,.12);border:1px solid rgba(255,215,64,.3);color:var(--warn)}
.layer.passed{border-color:rgba(0,230,118,.2)}
.layer.failed{border-color:rgba(255,82,82,.2)}
.layer.advisory{border-color:rgba(255,215,64,.2)}
.ltext{flex:1;color:var(--tx2)}
.lstatus{font-size:.72rem;font-family:'DM Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fl{margin-bottom:1rem}
.flabel{display:block;font-size:.78rem;color:var(--tx2);margin-bottom:.4rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.finput{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:.75rem 1rem;color:var(--tx);font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:all .2s}
.finput:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,139,255,.1)}
.finput::placeholder{color:var(--tx3)}
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.8rem;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 20px rgba(61,139,255,.3)}
.bp:hover{transform:translateY(-1px)}
.bp:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bs{background:var(--sur3);color:var(--tx);border:1px solid var(--bor)}
.errbox{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.25);border-radius:10px;padding:1rem;font-size:.85rem;color:var(--err);text-align:center;margin-bottom:1rem}
.success{display:none;position:absolute;inset:0;background:var(--sur);border-radius:24px;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem;z-index:20}
.success.show{display:flex;animation:fi .4s ease}
.scircle{width:80px;height:80px;border-radius:50%;background:rgba(0,230,118,.12);border:2px solid var(--ok);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:1rem;animation:scalein .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(0,230,118,.25)}
@keyframes scalein{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.gps-row{display:flex;align-items:center;margin-top:1.2rem;font-size:.75rem;color:var(--tx3)}
.gdot{width:8px;height:8px;border-radius:50%;background:var(--tx3);margin-right:.4rem;flex-shrink:0}
.gdot.on{background:var(--ok);animation:pulse 2s infinite}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card" id="main-card">
  <!-- Success overlay -->
  <div class="success" id="success-pane">
    <div class="scircle">✓</div>
    <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:.5rem;color:var(--ok)">Attendance Marked!</div>
    <div style="color:var(--tx);font-size:.95rem;font-weight:600" id="s-name">—</div>
    <div style="color:var(--tx2);font-size:.82rem;font-family:'DM Mono',monospace;margin-top:.2rem" id="s-reg">—</div>
    <div style="color:var(--tx2);font-size:.82rem;margin-top:.4rem" id="s-session">—</div>
    <div style="color:var(--tx3);font-size:.78rem;font-family:'DM Mono',monospace;margin-top:.2rem" id="s-time">—</div>
    <div style="margin-top:.75rem;display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center" id="s-layers"></div>
    <div style="margin-top:1.5rem;padding:1rem;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.15);border-radius:12px;font-size:.82rem;color:var(--tx2)">
      You may now close this page ✓
    </div>
  </div>

  <div class="logo">
    <span>Attend<span>X</span></span>
    <span style="font-size:.7rem;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.05em">STUDENT</span>
  </div>

  <div class="sesinfo" id="sesinfo">
    <div class="si-name" id="si-name">Loading session...</div>
    <div class="si-meta" id="si-meta">—</div>
  </div>

  <div class="gps-banner" id="gps-banner">
    <span id="gps-banner-icon">📍</span>
    <span id="gps-banner-text">—</span>
  </div>

  <div style="text-align:center">
    <div class="icon-wrap">📡</div>
    <div class="heading">Mark Attendance</div>
    <div class="sub">Enter your registration number to verify</div>
  </div>

  <div class="pipeline">
    <div class="layer pending" id="l1"><div class="ldot">—</div><div class="ltext">Token Validation</div><div class="lstatus" style="color:var(--tx3)">Pending</div></div>
    <div class="layer pending" id="l2"><div class="ldot">—</div><div class="ltext">Student Registration</div><div class="lstatus" style="color:var(--tx3)">Pending</div></div>
    <div class="layer pending" id="l3"><div class="ldot">—</div><div class="ltext">Duplicate Check</div><div class="lstatus" style="color:var(--tx3)">Pending</div></div>
    <div class="layer pending" id="l4"><div class="ldot">—</div><div class="ltext">GPS Proximity</div><div class="lstatus" style="color:var(--tx3)">—</div></div>
  </div>

  <div id="form-area">
    <div class="fl">
      <label class="flabel">Registration Number</label>
      <input class="finput" id="reg-input" placeholder="e.g. 2021CS001"
        style="font-family:'DM Mono',monospace;letter-spacing:.05em;text-transform:uppercase"
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')startVerification()">
    </div>
    <div id="action-area">
      <button class="btn bp" id="verify-btn" onclick="startVerification()">Mark Attendance</button>
    </div>
  </div>

  <div class="gps-row">
    <div class="gdot" id="gdot"></div>
    <span id="gps-text">Location: checking...</span>
  </div>
</div>

<script>
let TOKEN_VAL = '';
let LAT = null, LNG = null;
let sessionData = null;
let gpsRequired = false;

(function init() {
  const params = new URLSearchParams(window.location.search);
  TOKEN_VAL = params.get('token') || '';
  if (TOKEN_VAL) {
    verifyTokenOnLoad(TOKEN_VAL);
  } else {
    showError('No session token found. Please scan the professor\'s QR code.');
  }
  getGPS();
})();

async function verifyTokenOnLoad(token) {
  try {
    const res  = await fetch(`/api/sessions/verify/${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Invalid token');
    sessionData = data;

    const si = document.getElementById('sesinfo');
    si.classList.add('show');
    document.getElementById('si-name').textContent = data.session_name;
    const exp = new Date((data.expires_at.endsWith('Z') ? data.expires_at : data.expires_at.replace(' ','T')+'Z'));
    document.getElementById('si-meta').textContent = `${data.section_name}  ·  Expires at ${exp.toLocaleTimeString()}`;

    const gpsBanner = document.getElementById('gps-banner');
    if (data.prof_lat && data.geo_radius > 0) {
      gpsRequired = true;
      gpsBanner.className = 'gps-banner show gps-active';
      document.getElementById('gps-banner-icon').textContent = '📍';
      document.getElementById('gps-banner-text').textContent = `GPS active — must be within ${data.geo_radius}m of classroom`;
      setLayer('l4', 'checking', '⟳', 'Awaiting GPS...', 'var(--warn)');
    } else {
      gpsRequired = false;
      gpsBanner.className = 'gps-banner show gps-warn';
      document.getElementById('gps-banner-icon').textContent = '📍';
      document.getElementById('gps-banner-text').textContent = 'GPS check not enabled for this session';
      setLayer('l4', 'advisory', '⚠', 'Not required', 'var(--tx3)');
    }
  } catch (e) {
    showError(e.message);
  }
}

function getGPS() {
  if (!navigator.geolocation) { setGPSStatus(false, 'GPS not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      LAT = pos.coords.latitude.toFixed(6);
      LNG = pos.coords.longitude.toFixed(6);
      setGPSStatus(true, `${LAT}, ${LNG}  (±${Math.round(pos.coords.accuracy)}m)`);
      if (gpsRequired) setLayer('l4', 'checking', '⟳', 'Location ready', 'var(--ok)');
    },
    () => {
      setGPSStatus(false, 'Location unavailable');
      if (gpsRequired) setLayer('l4', 'advisory', '⚠', 'GPS denied', 'var(--warn)');
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

function setGPSStatus(on, msg) {
  document.getElementById('gdot').className = 'gdot' + (on ? ' on' : '');
  document.getElementById('gps-text').textContent = `Location: ${msg}`;
}

function setLayer(id, state, icon, status, color) {
  const el = document.getElementById(id); if (!el) return;
  el.className = `layer ${state}`;
  el.querySelector('.ldot').textContent = icon;
  const st = el.querySelector('.lstatus');
  st.textContent = status; st.style.color = color;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startVerification() {
  const regNo = document.getElementById('reg-input').value.trim().toUpperCase();
  if (!regNo) { showError('Please enter your registration number.'); return; }
  if (!TOKEN_VAL) { showError('No session token. Scan the QR code again.'); return; }

  document.getElementById('verify-btn').disabled = true;
  document.getElementById('reg-input').readOnly  = true;
  setAction('<div style="text-align:center;padding:.5rem"><div class="spinner"></div></div>');

  setLayer('l1', 'checking', '⟳', 'Validating...', 'var(--warn)');
  await sleep(400);
  setLayer('l2', 'checking', '⟳', 'Looking up...', 'var(--warn)');
  await sleep(300);
  setLayer('l3', 'checking', '⟳', 'Checking...', 'var(--warn)');
  if (gpsRequired) setLayer('l4', 'checking', '⟳', 'Verifying...', 'var(--warn)');
  await sleep(300);

  try {
    const res = await fetch('/api/attendance/submit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token: TOKEN_VAL, reg_number: regNo, latitude: LAT, longitude: LNG }),
    });
    const data = await res.json();

    if (!res.ok) {
      const msg = data.detail || 'Submission failed';
      if      (msg.includes('LAYER_1')) { setLayer('l1','failed','✗','Invalid/Expired','var(--err)'); }
      else if (msg.includes('LAYER_2')) { setLayer('l1','passed','✓','Valid','var(--ok)'); setLayer('l2','failed','✗','Not found in section','var(--err)'); }
      else if (msg.includes('LAYER_3')) { setLayer('l1','passed','✓','Valid','var(--ok)'); setLayer('l2','passed','✓','Found','var(--ok)'); setLayer('l3','failed','✗','Already marked','var(--err)'); }
      else if (msg.includes('LAYER_4')) { setLayer('l1','passed','✓','Valid','var(--ok)'); setLayer('l2','passed','✓','Found','var(--ok)'); setLayer('l3','passed','✓','No duplicate','var(--ok)'); setLayer('l4','failed','✗','Too far away','var(--err)'); }
      showError(msg.replace(/LAYER_\d_FAIL:\s*/g, ''));
      return;
    }

    setLayer('l1', 'passed', '✓', 'Valid', 'var(--ok)');
    setLayer('l2', 'passed', '✓', 'Verified', 'var(--ok)');
    setLayer('l3', 'passed', '✓', 'No duplicate', 'var(--ok)');
    const layers = data.layers || [];
    if (layers.includes('gps'))         setLayer('l4', 'passed',   '✓', `In range ✓`,  'var(--ok)');
    else if (layers.includes('gps_skipped')) setLayer('l4', 'advisory', '⚠', 'GPS skipped', 'var(--warn)');
    else                                setLayer('l4', 'advisory', '⚠', 'Not checked', 'var(--tx3)');

    await sleep(200);
    showSuccess(data);
  } catch (e) {
    showError('Network error — please try again.');
  }
}

function showSuccess(data) {
  document.getElementById('s-name').textContent    = data.student_name || '—';
  document.getElementById('s-reg').textContent     = data.reg_number   || '—';
  document.getElementById('s-session').textContent = `${data.session_name} · ${data.section_name}`;
  document.getElementById('s-time').textContent    = data.timestamp ? new Date(data.timestamp).toLocaleString('en-IN') : '—';
  const bc = { token:'#3d8bff', reg:'#7c4dff', duplicate:'#00e5ff', gps:'#00e676', gps_skipped:'#ffd740' };
  document.getElementById('s-layers').innerHTML = (data.layers||[]).map(l =>
    `<span style="background:${(bc[l]||'#3d8bff')}22;color:${(bc[l]||'#3d8bff')};border:1px solid ${(bc[l]||'#3d8bff')}44;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600">${l}</span>`
  ).join('');
  document.getElementById('success-pane').classList.add('show');
}

function showError(msg) {
  setAction(`<div class="errbox">${msg}</div><button class="btn bs" onclick="location.reload()">Try Again</button>`);
}

function setAction(html) { document.getElementById('action-area').innerHTML = html; }
</script>
</body>
</html>
